<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>

  <!-- Progress bars representing HPPP tracking -->
  <g transform="translate(50, 50)">
    <!-- 4 bars for H P P P -->
    <rect x="-28" y="5" width="8" height="25" rx="2" fill="white" opacity="0.9"/>
    <rect x="-13" y="-5" width="8" height="35" rx="2" fill="white" opacity="0.95"/>
    <rect x="2" y="-15" width="8" height="45" rx="2" fill="white"/>
    <rect x="17" y="-8" width="8" height="38" rx="2" fill="white" opacity="0.95"/>
  </g>

  <!-- Accent dot for highlights -->
  <circle cx="75" cy="25" r="6" fill="#F59E0B" opacity="0.9"/>
</svg>
